name: Update NgRx documentation

on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

concurrency:
  group: update-ngrx-documentation
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Refresh the stable NgRx documentation snapshot
        run: node scripts/update-ngrx-docs.mjs
      - name: Verify skills CLI discovery
        run: npx --yes skills@1.5.9 add . --list
      - name: Check the generated diff
        run: git diff --check
      - name: Open the documentation update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-ngrx-docs
          commit-message: Update NgRx documentation snapshot
          delete-branch: true
          title: Update NgRx documentation snapshot
          body: |
            A new stable `@ngrx/store` version was detected and the bundled
            documentation snapshot was refreshed from the package's `gitHead`.

            Before merging:

            - review the upstream guide diff and migration notes;
            - update the curated `references/*.md` files where behavior changed;
            - confirm that examples describe APIs available in the pinned version.
